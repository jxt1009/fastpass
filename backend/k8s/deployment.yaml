apiVersion: apps/v1
kind: Deployment
metadata:
  name: triprank-api
  labels:
    app: triprank-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: triprank-api
  template:
    metadata:
      labels:
        app: triprank-api
    spec:
      containers:
      - name: triprank-api
        image: triprank-api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        env:
        - name: PORT
          value: "8080"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: triprank-secrets
              key: database-url
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5

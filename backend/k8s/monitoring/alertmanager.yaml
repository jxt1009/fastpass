---
# SMTP credentials for Alertmanager email alerts
# kubectl create secret generic alertmanager-smtp \
#   --from-literal=smtp_password=YOUR_SMTP_PASSWORD \
#   --from-literal=alert_email_to=YOUR_EMAIL@example.com \
#   -n monitoring
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: monitoring
data:
  alertmanager.yml: |
    global:
      smtp_smarthost: "smtp.gmail.com:587"
      smtp_from: "fasttrack-alerts@gmail.com"  # Replace with your sending address
      smtp_auth_username: "fasttrack-alerts@gmail.com"  # Replace with your Gmail address
      smtp_auth_password_file: /etc/alertmanager/smtp_password
      smtp_require_tls: true

    route:
      receiver: email-alerts
      group_by: [alertname, severity]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h

      # Critical alerts repeat more frequently
      routes:
        - match:
            severity: critical
          receiver: email-alerts
          repeat_interval: 1h

    receivers:
      - name: email-alerts
        email_configs:
          - to: "YOUR_ALERT_EMAIL@example.com"  # Replace — or mount from secret
            send_resolved: true
            headers:
              Subject: "[FastTrack {{ .Status | toUpper }}] {{ .CommonLabels.alertname }}"

    inhibit_rules:
      # Suppress warnings when a critical alert is already firing for same target
      - source_match:
          severity: critical
        target_match:
          severity: warning
        equal: [alertname]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: monitoring
  labels:
    app: alertmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
    spec:
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.27.0
          args:
            - "--config.file=/etc/alertmanager/alertmanager.yml"
            - "--storage.path=/alertmanager"
          ports:
            - containerPort: 9093
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager/alertmanager.yml
              subPath: alertmanager.yml
            - name: smtp-secret
              mountPath: /etc/alertmanager/smtp_password
              subPath: smtp_password
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      volumes:
        - name: config
          configMap:
            name: alertmanager-config
        - name: smtp-secret
          secret:
            secretName: alertmanager-smtp
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: monitoring
spec:
  selector:
    app: alertmanager
  ports:
    - port: 9093
      targetPort: 9093

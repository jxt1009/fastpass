apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - deployment.yaml
  - service.yaml
  - ingress.yaml

# CI overrides this tag via: kustomize edit set image fasttrack-api=...
# Local/server builds use localhost:5000 (the on-server registry)
images:
  - name: fasttrack-api
    newName: localhost:5000/fasttrack-backend
    newTag: latest

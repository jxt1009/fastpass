apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: triprank-api
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - api.triprank.yourdomain.com
    secretName: triprank-api-tls
  rules:
  - host: api.triprank.yourdomain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: triprank-api
            port:
              number: 80

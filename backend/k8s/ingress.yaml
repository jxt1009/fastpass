apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fasttrack-api
  namespace: default
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - fast.toper.dev
    secretName: fasttrack-api-tls
  rules:
  - host: fast.toper.dev
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: fasttrack-api
            port:
              number: 80

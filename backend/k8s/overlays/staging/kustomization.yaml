apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: fasttrack-staging

resources:
  - ../../base
  - namespace.yaml
  - uploads-pv.yaml

patches:
  - path: patch-deployment.yaml
  - path: patch-ingress.yaml

labels:
  - pairs:
      environment: staging
    includeSelectors: true
    includeTemplates: true

# Default to local registry; CI replaces this via: kustomize edit set image fasttrack-api=ghcr.io/...
images:
  - name: fasttrack-api
    newName: localhost:5000/fasttrack-backend
    newTag: latest

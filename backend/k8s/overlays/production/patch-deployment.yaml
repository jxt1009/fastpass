apiVersion: apps/v1
kind: Deployment
metadata:
  name: fasttrack-api
spec:
  replicas: 2
  template:
    spec:
      containers:
        - name: fasttrack-api
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"

apiVersion: v1
kind: PersistentVolume
metadata:
  name: fasttrack-postgres-pv
spec:
  capacity:
    storage: 20Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: /data/fasttrack/postgres
    type: DirectoryOrCreate
  persistentVolumeReclaimPolicy: Retain
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: fasttrack-postgres-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  volumeName: fasttrack-postgres-pv
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: fasttrack-postgres-backup-pv
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: /data/fasttrack/backups
    type: DirectoryOrCreate
  persistentVolumeReclaimPolicy: Retain
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: fasttrack-postgres-backup-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  volumeName: fasttrack-postgres-backup-pv
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fasttrack-postgres
  namespace: default
  labels:
    app: fasttrack-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fasttrack-postgres
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: fasttrack-postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        env:
        - name: POSTGRES_DB
          value: fasttrack
        - name: POSTGRES_USER
          value: fasttrack
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: fasttrack-postgres-secret
              key: postgres-password
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        ports:
        - containerPort: 5432
          name: postgres
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
        - name: postgres-backup
          mountPath: /backups
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - fasttrack
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - fasttrack
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: fasttrack-postgres-pvc
      - name: postgres-backup
        persistentVolumeClaim:
          claimName: fasttrack-postgres-backup-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: fasttrack-postgres-service
  namespace: default
spec:
  selector:
    app: fasttrack-postgres
  ports:
  - port: 5432
    targetPort: 5432
    protocol: TCP
  type: ClusterIP

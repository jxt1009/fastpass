name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  test:
    name: Build, Vet & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fasttrack_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Build
        run: CGO_ENABLED=1 go build ./...

      - name: Vet
        run: CGO_ENABLED=1 go vet ./...

      - name: Test
        env:
          CGO_ENABLED: "1"
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/fasttrack_test?sslmode=disable
          JWT_SECRET: test-secret-not-used-in-production-at-least-64-chars-long-here
          APPLE_APP_BUNDLE_ID: dev.toper.FastTrack
        run: go test ./... -v -timeout 60s

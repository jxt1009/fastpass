name: iOS Release

on:
  push:
    tags:
      - 'v*'

jobs:
  testflight:
    name: Upload to TestFlight
    runs-on: macos-15

    defaults:
      run:
        working-directory: ios/FastTrack

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE=$(ls /Applications | grep -E '^Xcode_16' | sort -V | tail -1)
          if [ -n "$XCODE" ]; then
            sudo xcode-select -s "/Applications/$XCODE/Contents/Developer"
          fi
          xcodebuild -version

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: ios/FastTrack

      - name: Create Secrets.swift from template
        run: cp FastTrack/Secrets.swift.template FastTrack/Secrets.swift

      - name: Set App Store Connect API key
        env:
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          mkdir -p ~/.fastlane/spaceship
          echo "$APP_STORE_CONNECT_API_KEY" > ~/.fastlane/asc_key.json

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Run Fastlane beta
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          APP_STORE_CONNECT_API_KEY_PATH: ~/.fastlane/asc_key.json
          FL_VERSION_NUMBER: ${{ steps.version.outputs.version }}
        run: bundle exec fastlane beta

name: Backend Deploy

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-deploy.yml'

jobs:
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      sha: ${{ steps.version.outputs.sha }}
      image: ghcr.io/${{ github.repository_owner }}/fasttrack-backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version info
        id: version
        run: |
          echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/fasttrack-backend:latest
            ghcr.io/${{ github.repository_owner }}/fasttrack-backend:${{ steps.version.outputs.sha }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            COMMIT=${{ steps.version.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: build
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Verify cluster connectivity
        run: |
          kubectl cluster-info --request-timeout=10s || {
            echo "❌ Cannot reach cluster. Ensure port 6443 is forwarded on your router: 73.158.156.201:6443 → 10.0.0.102:6443"
            exit 1
          }

      - name: Ensure staging secrets exist
        run: |
          kubectl create namespace fasttrack-staging --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic fasttrack-secrets \
            --from-literal=database-url="${{ secrets.DATABASE_URL }}" \
            --from-literal=jwt-secret="${{ secrets.JWT_SECRET }}" \
            --from-literal=apple-app-bundle-id="${{ secrets.APPLE_APP_BUNDLE_ID }}" \
            --from-literal=base-url="${{ secrets.BASE_URL }}" \
            --namespace fasttrack-staging \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to staging
        run: |
          cd backend/k8s/overlays/staging
          kustomize edit set image fasttrack-api=ghcr.io/${{ github.repository_owner }}/fasttrack-backend:${{ needs.build.outputs.sha }}
          kubectl apply -k .
          kubectl rollout status deployment/fasttrack-api -n fasttrack-staging --timeout=120s

  deploy-production:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: [build, deploy-staging]
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Verify cluster connectivity
        run: |
          kubectl cluster-info --request-timeout=10s || {
            echo "❌ Cannot reach cluster. Ensure port 6443 is forwarded on your router: 73.158.156.201:6443 → 10.0.0.102:6443"
            exit 1
          }

      - name: Ensure production secrets exist
        run: |
          kubectl create namespace fasttrack-production --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic fasttrack-secrets \
            --from-literal=database-url="${{ secrets.DATABASE_URL }}" \
            --from-literal=jwt-secret="${{ secrets.JWT_SECRET }}" \
            --from-literal=apple-app-bundle-id="${{ secrets.APPLE_APP_BUNDLE_ID }}" \
            --from-literal=base-url="${{ secrets.BASE_URL }}" \
            --namespace fasttrack-production \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to production
        run: |
          cd backend/k8s/overlays/production
          kustomize edit set image fasttrack-api=ghcr.io/${{ github.repository_owner }}/fasttrack-backend:${{ needs.build.outputs.sha }}
          kubectl apply -k .
          kubectl rollout status deployment/fasttrack-api -n fasttrack-production --timeout=120s


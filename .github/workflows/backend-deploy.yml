name: Backend Deploy

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-deploy.yml'

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: []  # runs independently; backend-ci runs in parallel on the same push

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version info
        id: version
        run: |
          echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/fasttrack-backend:latest
            ghcr.io/${{ github.repository_owner }}/fasttrack-backend:${{ steps.version.outputs.sha }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            COMMIT=${{ steps.version.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          script: |
            docker pull ghcr.io/${{ github.repository_owner }}/fasttrack-backend:latest
            docker stop fasttrack-backend || true
            docker rm fasttrack-backend || true
            docker run -d \
              --name fasttrack-backend \
              --restart unless-stopped \
              -p 8080:8080 \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              -e APPLE_APP_BUNDLE_ID="${{ secrets.APPLE_APP_BUNDLE_ID }}" \
              -e BASE_URL="${{ secrets.BASE_URL }}" \
              -v /opt/fasttrack/uploads:/root/uploads \
              ghcr.io/${{ github.repository_owner }}/fasttrack-backend:latest
            # Wait for health check
            sleep 5
            curl -sf http://localhost:8080/health || exit 1

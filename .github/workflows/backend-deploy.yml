name: Backend Deploy

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-deploy.yml'

jobs:
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      sha: ${{ steps.version.outputs.sha }}
      image: ghcr.io/${{ github.repository_owner }}/fasttrack-backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version info
        id: version
        run: |
          echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/fasttrack-backend:latest
            ghcr.io/${{ github.repository_owner }}/fasttrack-backend:${{ steps.version.outputs.sha }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            COMMIT=${{ steps.version.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: build
    environment: staging
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          # API server cert doesn't include the public IP SAN; skip TLS cert verification.
          # Auth is still enforced via the service account token.
          CLUSTER_NAME=$(kubectl config view --minify -o jsonpath='{.clusters[0].name}')
          kubectl config set-cluster "$CLUSTER_NAME" --insecure-skip-tls-verify=true

      - name: Verify cluster connectivity
        run: |
          kubectl create namespace fasttrack-staging --dry-run=client -o yaml | kubectl apply -f -

          # Ensure secret exists (no-op if already present)
          kubectl create secret generic fasttrack-secrets \
            --from-literal=_placeholder=1 \
            --namespace fasttrack-staging \
            --dry-run=client -o yaml | kubectl apply --server-side --force-conflicts -f - 2>/dev/null || true

          # Update only non-empty GitHub secrets via merge-patch (leaves existing keys untouched).
          # For required keys: if not in GitHub secrets, verify cluster already has a non-empty
          # value — fail only if neither source has the key (true first-time misconfiguration).
          python3 << 'PYEOF'
          import subprocess, base64, json, sys

          ns = "fasttrack-staging"
          from_ci = {
              "database-url":        "${{ secrets.STAGING_DATABASE_URL }}",
              "jwt-secret":          "${{ secrets.JWT_SECRET }}",
              "apple-app-bundle-id": "${{ secrets.APPLE_APP_BUNDLE_ID }}",
              "base-url":            "${{ secrets.STAGING_BASE_URL }}",
              "google-client-id":    "${{ secrets.GOOGLE_CLIENT_ID }}",
              "google-client-secret":"${{ secrets.GOOGLE_CLIENT_SECRET }}",
          }

          required = {"database-url", "jwt-secret"}
          missing_from_ci = {k for k in required if not from_ci[k].strip()}
          if missing_from_ci:
              # Check if cluster already has these keys set
              r = subprocess.run(
                  ["kubectl", "get", "secret", "fasttrack-secrets", "-n", ns,
                   "-o", "jsonpath={.data}"],
                  capture_output=True, text=True)
              existing = json.loads(r.stdout) if r.stdout.strip() else {}
              truly_missing = [k for k in missing_from_ci
                               if not existing.get(k, "").strip()]
              if truly_missing:
                  print(f"ERROR: required secrets missing from both CI and cluster: {truly_missing}", file=sys.stderr)
                  sys.exit(1)
              print(f"INFO: {missing_from_ci} not in CI secrets — cluster values will be kept as-is")

          data = {k: base64.b64encode(v.strip().encode()).decode()
                  for k, v in from_ci.items() if v.strip()}
          if data:
              patch = json.dumps({"data": data})
              r = subprocess.run(
                  ["kubectl", "patch", "secret", "fasttrack-secrets",
                   "-n", ns, "--type=merge", "-p", patch],
                  capture_output=True, text=True)
              print(r.stdout, r.stderr)
              sys.exit(r.returncode)
          else:
              print("INFO: No CI secrets provided — cluster secret left unchanged")
          PYEOF

          kubectl create secret docker-registry ghcr-pull-secret \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GITHUB_TOKEN }} \
            --namespace fasttrack-staging \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to staging
        run: |
          cd backend/k8s/overlays/staging
          kustomize edit set image fasttrack-api=ghcr.io/${{ github.repository_owner }}/fasttrack-backend:${{ needs.build.outputs.sha }}
          kubectl apply -k .
          kubectl rollout status deployment/fasttrack-api -n fasttrack-staging --timeout=300s

  deploy-production:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: [build, deploy-staging]
    environment: production
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          # API server cert doesn't include the public IP SAN; skip TLS cert verification.
          # Auth is still enforced via the service account token.
          CLUSTER_NAME=$(kubectl config view --minify -o jsonpath='{.clusters[0].name}')
          kubectl config set-cluster "$CLUSTER_NAME" --insecure-skip-tls-verify=true

      - name: Verify cluster connectivity
        run: |
          kubectl create namespace fasttrack-production --dry-run=client -o yaml | kubectl apply -f -

          # Ensure secret exists (no-op if already present)
          kubectl create secret generic fasttrack-secrets \
            --from-literal=_placeholder=1 \
            --namespace fasttrack-production \
            --dry-run=client -o yaml | kubectl apply --server-side --force-conflicts -f - 2>/dev/null || true

          # Update only non-empty GitHub secrets via merge-patch (leaves existing keys untouched).
          # For required keys: if not in GitHub secrets, verify cluster already has a non-empty
          # value — fail only if neither source has the key (true first-time misconfiguration).
          python3 << 'PYEOF'
          import subprocess, base64, json, sys

          ns = "fasttrack-production"
          from_ci = {
              "database-url":        "${{ secrets.PRODUCTION_DATABASE_URL }}",
              "jwt-secret":          "${{ secrets.JWT_SECRET }}",
              "apple-app-bundle-id": "${{ secrets.APPLE_APP_BUNDLE_ID }}",
              "base-url":            "${{ secrets.PRODUCTION_BASE_URL }}",
              "google-client-id":    "${{ secrets.GOOGLE_CLIENT_ID }}",
              "google-client-secret":"${{ secrets.GOOGLE_CLIENT_SECRET }}",
          }

          required = {"database-url", "jwt-secret"}
          missing_from_ci = {k for k in required if not from_ci[k].strip()}
          if missing_from_ci:
              # Check if cluster already has these keys set
              r = subprocess.run(
                  ["kubectl", "get", "secret", "fasttrack-secrets", "-n", ns,
                   "-o", "jsonpath={.data}"],
                  capture_output=True, text=True)
              existing = json.loads(r.stdout) if r.stdout.strip() else {}
              truly_missing = [k for k in missing_from_ci
                               if not existing.get(k, "").strip()]
              if truly_missing:
                  print(f"ERROR: required secrets missing from both CI and cluster: {truly_missing}", file=sys.stderr)
                  sys.exit(1)
              print(f"INFO: {missing_from_ci} not in CI secrets — cluster values will be kept as-is")

          data = {k: base64.b64encode(v.strip().encode()).decode()
                  for k, v in from_ci.items() if v.strip()}
          if data:
              patch = json.dumps({"data": data})
              r = subprocess.run(
                  ["kubectl", "patch", "secret", "fasttrack-secrets",
                   "-n", ns, "--type=merge", "-p", patch],
                  capture_output=True, text=True)
              print(r.stdout, r.stderr)
              sys.exit(r.returncode)
          else:
              print("INFO: No CI secrets provided — cluster secret left unchanged")
          PYEOF

          kubectl create secret docker-registry ghcr-pull-secret \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GITHUB_TOKEN }} \
            --namespace fasttrack-production \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to production
        run: |
          cd backend/k8s/overlays/production
          kustomize edit set image fasttrack-api=ghcr.io/${{ github.repository_owner }}/fasttrack-backend:${{ needs.build.outputs.sha }}
          kubectl apply -k .
          kubectl rollout status deployment/fasttrack-api -n fasttrack-production --timeout=300s




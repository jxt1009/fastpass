name: Website Deploy

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - '.github/workflows/website-deploy.yml'

jobs:
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      sha: ${{ steps.version.outputs.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get short SHA
        id: version
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: website
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/fasttrack-web:latest
            ghcr.io/${{ github.repository_owner }}/fasttrack-web:${{ steps.version.outputs.sha }}

  deploy:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: build
    environment: production
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          CLUSTER_NAME=$(kubectl config view --minify -o jsonpath='{.clusters[0].name}')
          kubectl config set-cluster "$CLUSTER_NAME" --insecure-skip-tls-verify=true

      - name: Create ghcr pull secret
        run: |
          kubectl create namespace fasttrack-production --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret docker-registry ghcr-pull-secret \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GITHUB_TOKEN }} \
            --namespace fasttrack-production \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy website
        run: |
          cd website/k8s
          kustomize edit set image fasttrack-web=ghcr.io/${{ github.repository_owner }}/fasttrack-web:${{ needs.build.outputs.sha }}
          kubectl apply -k .
          kubectl rollout status deployment/fasttrack-web -n fasttrack-production --timeout=120s

      - name: Apply updated production ingress
        run: |
          cd backend/k8s/overlays/production
          kubectl apply -k .

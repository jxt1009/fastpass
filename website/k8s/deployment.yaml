apiVersion: apps/v1
kind: Deployment
metadata:
  name: fasttrack-web
  labels:
    app: fasttrack-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fasttrack-web
  template:
    metadata:
      labels:
        app: fasttrack-web
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: fasttrack-web
          image: fasttrack-web
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "32Mi"
              cpu: "20m"
            limits:
              memory: "64Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 15
